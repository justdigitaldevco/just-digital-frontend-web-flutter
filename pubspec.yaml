name: justdigital_webapp
description: "Aplicación web para crear documentos legales rápido y sencillo"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  http: ^1.5.0
  pdf: ^3.11.3
  printing: ^5.14.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/images/illustrations/
    - assets/images/illustrations/main_screen/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
    - family: LeagueGothic
      fonts:
        - asset: assets/fonts/LeagueGothic-Regular-VariableFont_wdth.ttf
